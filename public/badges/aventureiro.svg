<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            .badge-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 2px; fill: #F4F4F8; text-anchor: middle; }
            .badge-level { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 1px; fill: #2DD4BF; text-anchor: middle; opacity: 0.85; }
            .primary-glow { filter: drop-shadow(0px 4px 12px rgba(124, 92, 252, 0.4)); }
        </style>
        <linearGradient id="grad-primary-02" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9277FF" />
            <stop offset="100%" stop-color="#7C5CFC" />
        </linearGradient>
        <linearGradient id="grad-accent-02" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2DD4BF" />
            <stop offset="100%" stop-color="#14B8A6" />
        </linearGradient>
        <linearGradient id="grad-surface-02" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#24243A" />
            <stop offset="100%" stop-color="#1A1A2A" />
        </linearGradient>
    </defs>
    <g class="primary-glow">
        <polygon points="125,25 210,75 210,175 125,225 40,175 40,75" fill="url(#grad-primary-02)" />
    </g>
    <polygon points="125,34 200,78 200,172 125,216 50,172 50,78" fill="url(#grad-surface-02)" />
    <polygon points="125,42 192,81 192,169 125,208 58,169 58,81" fill="none" stroke="url(#grad-accent-02)" stroke-width="2.5" opacity="0.8" />
    <line x1="58" y1="81" x2="85" y2="100" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <line x1="192" y1="81" x2="165" y2="100" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <g transform="translate(100, 92)">
        <path d="M 10,40 L 40,10 M 40,10 L 35,5 M 40,10 L 45,15" stroke="#F4F4F8" stroke-width="3" stroke-linecap="round"/>
        <path d="M 40,40 L 10,10 M 10,10 L 15,5 M 10,10 L 5,15" stroke="#F4F4F8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="25" cy="25" r="6" fill="#2DD4BF"/>
    </g>
    <text x="125" y="172" class="badge-title">AVENTUREIRO</text>
    <text x="125" y="188" class="badge-level">LVL 6 - 10</text>
