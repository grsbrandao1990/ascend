<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            .badge-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 2px; fill: #F4F4F8; text-anchor: middle; }
            .badge-level { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 1px; fill: #2DD4BF; text-anchor: middle; opacity: 0.85; }
            .glow-effect { filter: drop-shadow(0px 0px 8px rgba(45, 212, 191, 0.5)); }
            .primary-glow { filter: drop-shadow(0px 4px 12px rgba(124, 92, 252, 0.4)); }
        </style>
        <linearGradient id="grad-primary-04" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9277FF" />
            <stop offset="100%" stop-color="#7C5CFC" />
        </linearGradient>
        <linearGradient id="grad-accent-04" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2DD4BF" />
            <stop offset="100%" stop-color="#14B8A6" />
        </linearGradient>
        <linearGradient id="grad-surface-04" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#24243A" />
            <stop offset="100%" stop-color="#1A1A2A" />
        </linearGradient>
    </defs>
    <g class="primary-glow">
        <polygon points="125,25 210,75 210,175 125,225 40,175 40,75" fill="url(#grad-primary-04)" />
    </g>
    <polygon points="125,34 200,78 200,172 125,216 50,172 50,78" fill="url(#grad-surface-04)" />
    <polygon points="125,38 196,79 196,171 125,212 54,171 54,79" fill="none" stroke="url(#grad-accent-04)" stroke-width="2" class="glow-effect" />
    <polygon points="125,46 188,82 188,168 125,204 62,168 62,82" fill="none" stroke="url(#grad-accent-04)" stroke-width="1.5" opacity="0.7" />
    <path d="M 62,95 L 85,115 L 62,135" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.4" />
    <path d="M 188,95 L 165,115 L 188,135" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.4" />
    <g transform="translate(125, 115)">
        <path d="M 0,-25 L 6,-6 L 25,0 L 6,6 L 0,25 L -6,6 L -25,0 L -6,-6 Z" fill="url(#grad-accent-04)" class="glow-effect"/>
        <circle cx="0" cy="0" r="4" fill="#FFFFFF" />
    </g>
    <text x="125" y="172" class="badge-title">VETERANO</text>
    <text x="125" y="188" class="badge-level">LVL 16 - 20</text>
