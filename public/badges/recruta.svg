<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            .badge-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 2px; fill: #F4F4F8; text-anchor: middle; }
            .badge-level { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 1px; fill: #2DD4BF; text-anchor: middle; opacity: 0.85; }
            .primary-glow { filter: drop-shadow(0px 4px 12px rgba(124, 92, 252, 0.4)); }
        </style>
        <linearGradient id="grad-primary-01" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9277FF" />
            <stop offset="100%" stop-color="#7C5CFC" />
        </linearGradient>
        <linearGradient id="grad-surface-01" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#24243A" />
            <stop offset="100%" stop-color="#1A1A2A" />
        </linearGradient>
    </defs>
    <g class="primary-glow">
        <polygon points="125,25 210,75 210,175 125,225 40,175 40,75" fill="url(#grad-primary-01)" />
    </g>
    <polygon points="125,32 202,77 202,173 125,218 48,173 48,77" fill="url(#grad-surface-01)" />
    <path d="M 105,38 L 125,27 L 145,38" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" />
    <path d="M 105,212 L 125,223 L 145,212" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" />
    <circle cx="125" cy="115" r="22" fill="#24243A" stroke="#2E2E44" stroke-width="2"/>
    <path d="M 125,98 L 125,132 M 115,110 L 135,110" stroke="#F4F4F8" stroke-width="3" stroke-linecap="round" />
    <text x="125" y="172" class="badge-title">RECRUTA</text>
